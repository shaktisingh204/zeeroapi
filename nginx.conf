# ZeroApi — production reverse proxy with TLS.
#
# Terminates HTTPS and routes:
#   /api/  -> Rust backend  (127.0.0.1:8081)   [SSE/live streaming friendly]
#   /      -> Next.js frontend (127.0.0.1:3100)
#
# Setup:
#   1. Point your DNS A record at this server.
#   2. Get certs (Let's Encrypt):  certbot --nginx -d api.example.com -d example.com
#      (or drop your fullchain/privkey at the paths below).
#   3. Replace `your-domain.example` with your domain, copy to
#      /etc/nginx/sites-available/zeroapi, symlink into sites-enabled, `nginx -t && systemctl reload nginx`.
#
# The frontend's NEXT_PUBLIC_API_URL and the backend CORS_ORIGINS/PORTAL_BASE_URL
# must use the public https URL — set them via deploy.sh:
#   sudo PUBLIC_HOST=your-domain.example \
#        PUBLIC_API_URL=https://your-domain.example/api \
#        CORS_ORIGINS=https://your-domain.example \
#        PORTAL_BASE_URL=https://your-domain.example ./deploy.sh

upstream zeroapi_backend  { server 127.0.0.1:8081; keepalive 32; }
upstream zeroapi_frontend { server 127.0.0.1:3100; keepalive 32; }

# Redirect all HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.example;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name your-domain.example;

    ssl_certificate     /etc/letsencrypt/live/your-domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_types application/json application/javascript text/css text/plain image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 2m;

    # ---- API (Rust backend) — keep the /api prefix; stream SSE without buffering ----
    location /api/ {
        proxy_pass http://zeroapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # Live updates (SSE) — disable buffering and allow long-lived connections.
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # ---- Frontend (Next.js) ----
    location / {
        proxy_pass http://zeroapi_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
